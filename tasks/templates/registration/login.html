<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Вхід — TaskFlow</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{background:#09090b;color:#f4f4f5;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 50% 0%,rgba(139,92,246,.08) 0%,transparent 60%);}.box{width:100%;max-width:380px;padding:20px;}.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px;}.lm{width:34px;height:34px;background:linear-gradient(135deg,#8b5cf6,#6366f1);border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(139,92,246,.4);}.lm svg{width:17px;height:17px;fill:white;}.lt{font-size:17px;font-weight:700;letter-spacing:-.02em;}.lt span{color:#8b5cf6;}.card{background:#111113;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:24px;}.card h2{font-size:15px;font-weight:600;margin-bottom:20px;color:#f4f4f5;}.fg{margin-bottom:13px;}.fl{display:block;font-size:10.5px;font-weight:700;color:#52525b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}.ci{width:100%;background:#1c1c1f;border:1px solid rgba(255,255,255,.08);color:#f4f4f5;padding:9px 12px;border-radius:6px;font-size:13px;font-family:inherit;transition:border-color .13s,box-shadow .13s;}.ci:focus{outline:none;border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.1);}.ci::placeholder{color:#3f3f46;}.btn{width:100%;background:linear-gradient(135deg,#8b5cf6,#6366f1);color:white;border:none;padding:10px;border-radius:6px;font-size:13.5px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:4px;transition:opacity .13s;box-shadow:0 2px 12px rgba(139,92,246,.35);}.btn:hover{opacity:.9;}.err{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);border-radius:6px;padding:9px 12px;font-size:12.5px;margin-bottom:12px;}.fe{font-size:11px;color:#f87171;margin-top:3px;}.ft{text-align:center;margin-top:14px;font-size:12px;color:#3f3f46;}.ft a{color:#a78bfa;}.back{display:block;text-align:center;margin-bottom:14px;font-size:12px;color:#52525b;}.back:hover{color:#a1a1aa;}</style></head><body><div class="box"><a href="/" class="back">← На головну</a><div class="logo"><div class="lm"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div><span class="lt">Task<span>Flow</span></span></div><div class="card">
<h2>Увійти до акаунту</h2>{% if form.errors %}<div class="err">Невірний логін або пароль</div>{% endif %}<form method="post">{% csrf_token %}<div class="fg"><label class="fl">Логін</label><input type="text" name="username" class="ci" autofocus placeholder="Введіть логін"></div><div class="fg"><label class="fl">Пароль</label><input type="password" name="password" class="ci" placeholder="Введіть пароль"></div><button type="submit" class="btn">Увійти →</button></form></div><div class="ft">Немає акаунту? <a href="{% url 'tasks:register' %}">Зареєструватися</a></div></div></body></html>
