<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Вхід — TaskFlow</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{background:#0d0d0f;color:#e8e8f0;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}.box{width:100%;max-width:380px;padding:20px;}.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px;}.logo-ic{width:34px;height:34px;background:#7c3aed;border-radius:9px;display:flex;align-items:center;justify-content:center;}.logo-ic svg{width:17px;height:17px;fill:white;}.logo-txt{font-size:18px;font-weight:700;}.card{background:#16161a;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:24px;}.card h2{font-size:15px;font-weight:600;margin-bottom:18px;}.fg{margin-bottom:13px;}.fl{display:block;font-size:10.5px;font-weight:600;color:#45454f;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}.ci{width:100%;background:#1e1e24;border:1px solid rgba(255,255,255,.08);color:#e8e8f0;padding:8px 11px;border-radius:5px;font-size:13px;font-family:inherit;transition:border-color .13s;}.ci:focus{outline:none;border-color:#7c3aed;}.ci::placeholder{color:#35353f;}.btn{width:100%;background:#7c3aed;color:white;border:none;padding:9px;border-radius:5px;font-size:13.5px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:4px;transition:background .13s;}.btn:hover{background:#6d28d9;}.err{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);border-radius:5px;padding:8px 11px;font-size:12.5px;margin-bottom:12px;}.ft{text-align:center;margin-top:14px;font-size:12px;color:#35353f;}.ft a{color:#a78bfa;}.back{display:block;text-align:center;margin-bottom:14px;font-size:12px;color:#45454f;}</style></head><body><div class="box"><a href="/" class="back">← На головну</a><div class="logo"><div class="logo-ic"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div><span class="logo-txt">TaskFlow</span></div><div class="card">
<h2>Увійти до акаунту</h2>{% if form.errors %}<div class="err">Невірний логін або пароль</div>{% endif %}<form method="post">{% csrf_token %}<div class="fg"><label class="fl">Логін</label><input type="text" name="username" class="ci" autofocus placeholder="Введіть логін"></div><div class="fg"><label class="fl">Пароль</label><input type="password" name="password" class="ci" placeholder="Введіть пароль"></div><button type="submit" class="btn">Увійти</button></form></div><div class="ft">Немає акаунту? <a href="{% url 'tasks:register' %}">Зареєструватися</a></div></div></body></html>
