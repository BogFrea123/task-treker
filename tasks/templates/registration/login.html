{% extends 'tasks/base.html' %}

{% block title %}Вхід — Task Tracker{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-4 offset-md-4">
        <div class="card mt-4">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt mr-2"></i>Вхід</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <label class="font-weight-bold">Логін</label>
                        <input type="text" name="username" class="form-control" autofocus required placeholder="Введіть логін">
                    </div>
                    <div class="form-group">
                        <label class="font-weight-bold">Пароль</label>
                        <input type="password" name="password" class="form-control" required placeholder="Введіть пароль">
                    </div>
                    {% if form.errors %}
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-circle mr-1"></i>Невірний логін або пароль.
                    </div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fas fa-sign-in-alt mr-1"></i>Увійти
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0 text-muted small">
                    Ще немає акаунту?
                    <a href="{% url 'tasks:register' %}" class="text-success font-weight-bold">Зареєструватися</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
