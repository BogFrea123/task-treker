{% extends 'tasks/base.html' %}

{% block title %}Видалення задачі — Task Tracker{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="fas fa-exclamation-triangle mr-2"></i>Підтвердження видалення</h5>
            </div>
            <div class="card-body text-center p-4">
                <p class="lead mb-1">Ви впевнені, що хочете видалити задачу:</p>
                <h5 class="font-weight-bold text-danger mb-3">«{{ task.title }}»</h5>
                <p class="text-muted small">Цю дію неможливо скасувати.</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'tasks:task_detail' task.pk %}" class="btn btn-outline-secondary mr-3">
                            <i class="fas fa-arrow-left mr-1"></i>Скасувати
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash mr-1"></i>Так, видалити
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
