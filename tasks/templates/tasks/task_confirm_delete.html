{% extends 'tasks/base.html' %}
{% block title %}Видалення — TaskFlow{% endblock %}
{% block page_title %}Видалення задачі{% endblock %}

{% block content %}
<div style="max-width:440px;">
  <div class="card" style="border-color:rgba(239,68,68,0.3);">
    <div style="text-align:center; padding:8px 0 16px;">
      <div style="width:44px; height:44px; border-radius:50%; background:var(--red-soft); display:flex; align-items:center; justify-content:center; margin:0 auto 12px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </div>
      <h2 style="font-size:15px; font-weight:600; margin-bottom:8px;">Видалити задачу?</h2>
      <p style="font-size:13px; color:var(--text-secondary);">«{{ task.title }}»</p>
      <p style="font-size:12px; color:var(--text-muted); margin-top:6px;">Цю дію неможливо скасувати.</p>
    </div>
    <form method="post" style="display:flex; gap:8px; justify-content:center; padding-top:12px; border-top:1px solid var(--border);">
      {% csrf_token %}
      <a href="{% url 'tasks:task_detail' task.pk %}" class="btn btn-ghost">Скасувати</a>
      <button type="submit" class="btn btn-danger" style="background:var(--red); color:white;">Так, видалити</button>
    </form>
  </div>
</div>
{% endblock %}
