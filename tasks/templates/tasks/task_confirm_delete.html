{% extends 'tasks/base.html' %}
{% block title %}Видалення{% endblock %}
{% block page_title %}Видалення задачі{% endblock %}
{% block content %}
<div style="max-width:420px;">
  <div class="card" style="border-color:rgba(239,68,68,.25);text-align:center;padding:28px;">
    <div style="width:44px;height:44px;border-radius:50%;background:var(--red-s);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></div>
    <h2 style="font-size:15px;font-weight:600;margin-bottom:8px;">Видалити задачу?</h2>
    <p style="font-size:13px;color:var(--txt2);margin-bottom:4px;">«{{ task.title }}»</p>
    <p style="font-size:12px;color:var(--muted);margin-bottom:22px;">Цю дію неможливо скасувати</p>
    <form method="post" style="display:flex;gap:8px;justify-content:center;">{% csrf_token %}<a href="{% url 'tasks:task_detail' task.pk %}" class="btn btn-ghost">Скасувати</a><button type="submit" class="btn btn-danger" style="background:var(--red);color:white;">Так, видалити</button></form>
  </div>
</div>
{% endblock %}
