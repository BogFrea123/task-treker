{% extends 'tasks/base.html' %}
{% block title %}Новий тег — TaskFlow{% endblock %}
{% block page_title %}Новий тег{% endblock %}

{% block content %}
<div style="max-width:400px;">
  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Назва тегу</label>
        {{ form.name }}
        {% if form.name.errors %}<div class="form-error">{{ form.name.errors.0 }}</div>{% endif %}
      </div>
      <div class="form-group">
        <label class="form-label">Колір</label>
        <div style="display:flex; align-items:center; gap:12px;">
          <input type="color" name="color" value="{{ form.color.value|default:'#7c3aed' }}" style="width:44px; height:36px; border:none; background:none; cursor:pointer; padding:0; border-radius:4px;">
          <span style="font-size:12px; color:var(--text-muted);">Оберіть колір тегу</span>
        </div>
      </div>
      <div style="display:flex; justify-content:space-between; margin-top:16px; padding-top:14px; border-top:1px solid var(--border);">
        <a href="{% url 'tasks:tag_list' %}" class="btn btn-ghost">Скасувати</a>
        <button type="submit" class="btn btn-primary">Створити тег</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
